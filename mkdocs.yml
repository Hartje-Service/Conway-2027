site_name: Conway 2027 – Výrobní manuál
site_description: Výrobní manuál pro modely Conway 2027
site_author: Hartje Production

theme:
  name: material
  language: cs
  palette:
    primary: "#0b4ea2"
    accent: "#009fe3"
  custom_dir: overrides

extra_css:
  - styles/extra.css

plugins:
  - search
  - include-markdown:
      preserve_includer_indent: false
  - macros

extra:
  base_url: "https://hartje-service.github.io/V-robn-manu-l"

markdown_extensions:
  - md_in_html
  - tables
  - admonition

nav:

  - Obecné:
      - Specifikace: obecne/specifikace.md
      - Bezpečnost: obecne/bezpecnost.md
      - Nástroje: obecne/nastroje.md

  - Modely:
      - Cairon C 1.0:
          - Přehled: modely/cairon-c-1-0/Přehled.md
          - Montáž: modely/cairon-c-1-0/Montáž.md
          - Kusovníky: modely/cairon-c-1-0/Kusovníky.md

      - Cairon C 2.0:
          - Přehled: modely/cairon-c-2-0/Přehled.md
          - Montáž: modely/cairon-c-2-0/Montáž.md
          - Kusovníky: modely/cairon-c-2-0/Kusovníky.md

      - Cairon C 4.0:
          - Přehled: modely/cairon-c-4-0/Přehled.md
          - Montáž: modely/cairon-c-4-0/Montáž.md
          - Kusovníky: modely/cairon-c-4-0/Kusovníky.md

      - Cairon S 2.0:
          - Přehled: modely/cairon-s-2-0/Přehled.md
          - Montáž: modely/cairon-s-2-0/Montáž.md
          - Kusovníky: modely/cairon-s-2-0/Kusovníky.md

      - Cairon S 3.0:
          - Přehled: modely/cairon-s-3-0/Přehled.md
          - Montáž: modely/cairon-s-3-0/Montáž.md
          - Kusovníky: modely/cairon-s-3-0/Kusovníky.md

  - Přílohy:
      - Utahovací Momenty: prilohy/tabulka-momentu.md
