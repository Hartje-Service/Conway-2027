site_name: Conway 2027 – Výrobní manuál
site_description: Výrobní manuál pro modely Conway 2027
site_author: Hartje Production

theme:
  name: material
  language: cs
  palette:
    primary: "#0b4ea2"
    accent: "#009fe3"
  custom_dir: overrides

extra_css:
  - styles/extra.css

plugins:
  - search
  - include-markdown
      preserve_includer_indent: false
  - macros

extra:
  base_url: "https://hartje-service.github.io/QiO-2027"

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  
nav:

  - Obecné:
      - Specifikace: obecne/specifikace.md
      - Bezpečnost: obecne/bezpecnost.md
      - Nástroje: obecne/nastroje.md

  - Modely:
      - Cairon C 1.0:
          - Přehled: modely/cairon-c-1-0/index.md
          - Montáž: modely/cairon-c-1-0/Montáž.md
          - Kusovníky: modely/cairon-c-1-0/Kusovníky.md

